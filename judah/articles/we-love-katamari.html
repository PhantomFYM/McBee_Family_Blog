<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Katamari House</title>
        <meta name="description" content="I drew the Katamari house">
        <link rel="stylesheet" href="../../assets/css/standard.css">
        <link rel="stylesheet" href="../../assets/css/judah/we-love-katamari.css"
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="../../assets/bee.svg">
    </head>
    <body>
        <header>
            <a class="home-button" href="../../index.html">Home</a>
        </header>
        <main>
            <div id="left-bar"></div>
            <div id="right-bar"></div>
            <div id="bottom-bar"></div>
            <div id="canvas">
                
                <div id="sky">
                    <div class="grass grass-1"></div>
                    <div class="grass grass-2"></div>
                    <div class="grass grass-3"></div>
                    <div class="grass grass-4"></div>
                    <div class="grass grass-5"></div>
                    <div class="grass grass-6"></div>
                    <div class="grass grass-7"></div>
                    <div class="grass grass-8"></div>
                    <div class="grass grass-9"></div>
                    <div class="grass grass-10"></div>
                    <div class="grass grass-11"></div>
                    <div class="grass grass-12"></div>
                    <div class="grass grass-13"></div>
                    <div class="grass grass-14"></div>
                    <div class="grass grass-15"></div>
                    <div class="grass grass-16"></div>
                    <div class="grass grass-17"></div>
                    <div class="grass grass-18"></div>
                    <div class="grass grass-19"></div>
                    <div class="grass grass-20"></div>
                    <div class="grass grass-21"></div>
                    <div class="grass grass-22"></div>
                    <div class="grass grass-23"></div>
                    <div class="grass grass-24"></div>
                    <div class="grass grass-25"></div>
                    <div class="grass grass-26"></div>
                    <div class="grass grass-27"></div>
                    <div class="grass grass-28"></div>
                    <div class="grass grass-29"></div>
                    <div class="grass grass-30"></div>
                    <div class="grass grass-31"></div>
                    <div class="grass grass-32"></div>
                    <div class="grass grass-33"></div>
                    <div class="grass grass-34"></div>
                    <div class="grass grass-35"></div>
                    <div class="grass grass-36"></div>
                </div>
                <div id="roof"></div>
                <div id="house">
                    <div id="left-window"></div>
                    <div id="right-window"></div>
                    <div id="prince-blocker">
                        <div id="prince-hand"></div>
                    </div>
                    <div id="door">
                        <div id="prince-body"></div>
                        <div id="prince-antenna"></div>
                        <div id="prince-pom-pom"></div>
                        <div id="prince-head">
                            <div id="prince-face">
                                <div id="left-eye"></div>
                                <div id="right-eye"></div>
                                <div id="mouth"></div>
                                <div id="nose"></div>
                            </div>
                        </div>
                        
                    </div>
                </div>
                <div id="floor"></div>
                <div id="left-stump">
                    <div class="branch first"></div>
                    <div class="branch second"></div>
                    <div class="branch third"></div>
                    <div class="branch fourth"></div>
                    <div class="branch fifth"></div>
                    <div class="branch third mirror"></div>
                    <div class="branch fourth mirror"></div>
                    <div class="branch fifth mirror"></div>
                    <div class="leaf first"></div>
                    <div class="leaf second"></div>
                    <div class="leaf third"></div>
                    <div class="leaf fourth"></div>
                    
                </div>
                <div class="leaf fifth"></div>
                <div class="leaf fifth mirror"></div>
                <div class="leaf top"></div>
                <div id="right-stump">
                </div>
                <div class="katamari">
                    <div class="circle one"></div>
                    <div class="circle two"></div>
                    <div class="circle three"></div>
                    <div class="oval one"></div>
                    <div class="oval two"></div>
                    <div class="oval three"></div>
                    <div class="oval four"></div>
                    <div class="oval five"></div>
                    <div class="oval six"></div>
                </div> 

            </div>
                
            
        </main>
    </body>
</html>
